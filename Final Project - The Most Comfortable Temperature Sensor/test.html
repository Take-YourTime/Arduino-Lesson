<html lang="en"> 
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
        <meta http-equiv="Pragma" content="no-cache">
        <meta http-equiv="Expires" content="0">
        <title>環境舒適度顯示</title>
        <style>
            /* 頁面設置 */
            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background: linear-gradient(to bottom, #69b3ff, #ffffff);
                color: #333;
                text-align: center;
            }

            /* 標題樣式 */
            header {
                background: #007acc;
                color: white;
                padding: 15px 0;
                font-size: 1.5em;
            }

            /* 主要區域 */
            .main {
                margin: 20px auto;
            }

            .comfort-display {
                font-size: 5em; /* 舒適度數字放大 */
                color: #fff;
                text-shadow: 3px 3px 5px rgba(0, 0, 0, 0.3);
                margin-top: 10px;
            }

            .status {
                font-size: 2em;
                margin-top: 10px;
                color: #333;
            }

            .suggesstion {
                font-size: 2em;
                margin-top: 10px;
                color: #d54a00; 
            }

            .record {
                font-size: 1.2em;
                margin-top: 20px;
            }

            .icon {
                font-size: 6em;
                margin-top: 10px;
                color: #fff;
                text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            }

            /* 預報區塊 */
            .forecast {
                display: flex;
                justify-content: center;
                gap: 20px;
                margin-top: 30px;
            }

            .forecast-box {
                background: #f2f2f2;
                border-radius: 10px;
                padding: 10px;
                width: 80px;
            }

            .forecast-box p {
                margin: 5px 0;
            }

            footer {
                margin-top: 30px;
                color: #666;
            }
        </style>
    </head>
    <body>
        <!-- 標題區域 -->
        <header>環境舒適度</header>

        <!-- 主區域顯示舒適度 -->
        <div class="main">
            <!-- 圖標顯示 -->
            <div class="icon" id = main-icon>%icon%</div>
            <div class="comfort-display" id="comfort-level">%THI%</div>
            <div class="status" id="comfort-status">%currentStatus%</div>
        </div>

        <!-- 最大最小記錄 -->
        <div class="record">
            <p>濕度：<span id="h">%humanity%%</span></p>
            <p>溫度：<span id="t">%temperature%°c</span></p>
            <p>露點溫度：<span id="td">%DewPoint%°c</span></p>
            <p>最大 THI：<span id="max-thi">%max_THI%</span>，當時狀況：<span id="max-status">%maxStatus%</span></p>
            <p>最小 THI：<span id="min-thi">%min_THI%</span>，當時狀況：<span id="min-status">%minStatus%</span></p>
        </div>

        <!-- 新增建議文字 -->
        <div class="suggesstion" id="suggess">%suggesstion%</div>

        <!-- 底部 -->
        <footer>即時環境舒適度數據</footer>
        
        <script>
            setTimeout(function() {
                window.location.reload(true);
            }, 5000); // 每 5 秒強制刷新

            let value = 'PLACEHOLDER'; // 將 'PLACEHOLDER' 替換為 Arduino 的數據
            let colors = ['#0000FF', '#8F8FBD', '#00FFFF', '#00FF00', '#FFA500', '#FF0000'];
            document.body.style.backgroundColor = colors[value % colors.length];
        </script>
    </body>
</html>
